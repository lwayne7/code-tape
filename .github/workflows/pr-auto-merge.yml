name: Training PR Auto Merge

on:
  workflow_run:
    workflows: ["Training PR Guard", "Workflow Tests", "Contract Guard"]
    types: [completed]
  pull_request_target:
    branches: [main]
    types: [opened, edited, synchronize, reopened, ready_for_review]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  auto-merge:
    if: >
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success'
      ) ||
      (
        github.event_name != 'workflow_run' &&
        (github.event_name != 'issue_comment' || github.event.issue.pull_request != null)
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.TRAINING_BOT_TOKEN || github.token }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: node scripts/workflows/auto-merge-pr.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.TRAINING_BOT_TOKEN || secrets.GITHUB_TOKEN }}
