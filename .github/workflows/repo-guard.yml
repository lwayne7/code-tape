name: Repo Guard

on:
  pull_request_target:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  issues:
    types: [opened]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  guard:
    if: >
      github.actor != 'dependabot[bot]' &&
      (
        (
          github.event_name == 'pull_request_target'
        ) ||
        (
          github.event_name == 'issues' &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association)
        ) ||
        (
          github.event_name == 'issue_comment' &&
          contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
          !contains(fromJSON('["认领","确认合并","CR通过"]'), github.event.comment.body)
        )
      )
    concurrency:
      group: repo-guard-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
      cancel-in-progress: true
    runs-on:
      - self-hosted
      - macOS
      - repo-guard-intranet
    steps:
      - uses: ceilf6/repo-guard@main
        with:
          type: both
          provider: ${{ vars.LLM_PROVIDER }}
          model: ${{ vars.LLM_MODEL }}
          api-key: ${{ secrets.LLM_API_KEY }}
          base-url: ${{ vars.LLM_BASE_URL }}
          github-token: ${{ secrets.TRAINING_BOT_TOKEN || secrets.GITHUB_TOKEN }}
